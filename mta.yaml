_schema-version: 3.3.0
ID: centro_medico_node
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: centro_medico_node-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: centro_medico_node-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          timeout: 600000
          forwardAuthToken: true

  - name: centro_medico_node-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: centro_medico_node-auth
      - name: centro_medico_node-db

  - name: centro_medico_node-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: centro_medico_node-db

resources:
  - name: centro_medico_node-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: centro_medico_node-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'CentroMedico_Admin'
            description: 'Administradores del centro médico'
            role-template-references:
              - '$XSAPPNAME.admin'
          - name: 'CentroMedico_Paciente'
            description: 'Pacientes del centro médico'
            role-template-references:
              - '$XSAPPNAME.paciente'
  - name: centro_medico_node-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
