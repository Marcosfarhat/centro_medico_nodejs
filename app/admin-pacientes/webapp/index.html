<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes - Centro Médico</title>

  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.fe.templates"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatversion="edge"
    data-sap-ui-async="true"
    data-sap-ui-resourceroots='{"centro.medico.admin.pacientes": "./"}'
    data-sap-ui-frameOptions="allow">
  </script>

  <script>
    sap.ui.require(
      ["sap/m/Shell", "sap/ui/core/ComponentContainer"],
      function (Shell, ComponentContainer) {
        new Shell({
          app: new ComponentContainer({
            height : "100%",
            name   : "centro.medico.admin.pacientes",
            settings: { id: "centro.medico.admin.pacientes" },
            async  : true
          })
        }).placeAt("content");
      }
    );
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
